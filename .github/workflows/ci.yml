name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: automation_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d automation_platform_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/automation_platform_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-change-me
      JWT_REFRESH_SECRET: ci-refresh-secret-change-me
      SECRET_ENCRYPTION_KEY: ci-secret-encryption-key
      AI_SERVICE_URL: http://localhost:8000
      AI_SERVICE_API_KEY: dev-ai-service-key
      PUBLIC_API_URL: http://localhost:3001
      WEBHOOK_TOKEN_PEPPER: ci-webhook-token-pepper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: python -m venv apps/ai-service/.venv
      - run: pnpm --filter @automation/ai-service bootstrap
      - run: pnpm db:generate
      - run: pnpm --filter @automation/api exec prisma migrate deploy --schema prisma/schema.prisma
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Validate RC scripts
        run: |
          find scripts/release scripts/rehearsal -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          node --check scripts/release/validate-manifest.mjs
          node --check scripts/release/manifest-to-env.mjs
          node --check scripts/release/validate-go-record.mjs
      - name: Test RC release tooling
        run: pnpm rc:tooling:test

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ".[dev]"
      - run: pytest
