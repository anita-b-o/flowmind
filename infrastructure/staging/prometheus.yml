global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/flowmind-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: flowmind-api
    bearer_token_file: /run/secrets/metrics_api_key
    metrics_path: /metrics
    static_configs:
      - targets: ["api:9464"]
        labels:
          service: api

  - job_name: flowmind-worker
    bearer_token_file: /run/secrets/metrics_api_key
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9465"]
        labels:
          service: worker

  - job_name: flowmind-ai-service
    bearer_token_file: /run/secrets/metrics_api_key
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-service:8000"]
        labels:
          service: ai-service
