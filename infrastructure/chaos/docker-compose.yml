services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowmind_chaos
    ports: ["${CHAOS_POSTGRES_PORT:-55432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flowmind_chaos"]
      interval: 1s
      timeout: 1s
      retries: 30
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["${CHAOS_REDIS_PORT:-56379}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 1s
      retries: 30
